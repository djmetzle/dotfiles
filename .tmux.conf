# All the foreground colors seem to be ignored for some reason...
# Colors: black, red, green, yellow, blue, magenta, cyan, white or default

set -g status-justify left

set -g status-bg "#222222" #base02
set -g status-fg "#00FFA0"

set-window-option -g window-status-style fg="#00FF80",bg="#000000"

# active window title colors
set-window-option -g window-status-current-style fg="#000000",bg="#00F080",bold

# pane border
set-option -g pane-border-style fg=black #base02
set-option -g pane-active-border-style fg="#00FF80" #base01

# message text
set-option -g message-style bg=black,fg="#00FF80"

# clock
set-window-option -g clock-mode-colour red #green

# Reload configuration.
bind r source-file ~/.tmux.conf

set-window-option -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind | split-window -h
bind \\ split-window -h -p 33
bind - split-window -v

# Having this change triggers iTerm's window-change-notifications
#set -g status-right '#[fg=black](#(hostname -s))#(uptime | cut -d "," -f 4-)'
set -g status-right '#[fg=black](#(hostname -s))'

# Set window notifications
setw -g monitor-activity on
set -g visual-activity on

is_vim="ps -o comm= -t '#{pane_tty}' | grep -iqE '^n?vim?$'"

bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"

bind C-l send-keys 'C-l'
bind C-k send-keys 'C-k'

# Alt+<number> to switch between sessions by session ID ($0, $1, ...)
bind-key -n M-1 switch-client -t '$0'
bind-key -n M-2 switch-client -t '$1'
bind-key -n M-3 switch-client -t '$2'
bind-key -n M-4 switch-client -t '$3'
bind-key -n M-5 switch-client -t '$4'
bind-key -n M-q switch-client -t '$5'
bind-key -n M-w switch-client -t '$6'
bind-key -n M-e switch-client -t '$7'
bind-key -n M-r switch-client -t '$8'
